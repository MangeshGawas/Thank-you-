<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
background-size:400% 400%;
animation: gradientBG 10s ease infinite;
overflow:hidden;
color:white;
padding:20px;
}

@keyframes gradientBG {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

.container{
text-align:center;
max-width:700px;
animation: fadeIn 2s ease-in-out;
}

h1{
font-size:48px;
font-family: 'Dancing Script', cursive;
animation: float 3s ease-in-out infinite;
margin-bottom:20px;
}

.message{
font-size:20px;
line-height:1.8;
background: rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
backdrop-filter: blur(10px);
animation: fadeIn 3s ease-in-out;
}

@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-15px); }
100% { transform: translateY(0px); }
}

@keyframes fadeIn {
0% { opacity:0; transform:translateY(20px); }
100% { opacity:1; transform:translateY(0); }
}

.heart{
position:absolute;
font-size:25px;
animation: floatHearts 10s linear infinite;
opacity:0.8;
}

.heart:nth-child(1){ left:10%; animation-duration:12s;}
.heart:nth-child(2){ left:25%; animation-duration:9s;}
.heart:nth-child(3){ left:40%; animation-duration:14s;}
.heart:nth-child(4){ left:60%; animation-duration:10s;}
.heart:nth-child(5){ left:75%; animation-duration:11s;}
.heart:nth-child(6){ left:90%; animation-duration:13s;}

@keyframes floatHearts{
0%{ transform:translateY(100vh); }
100%{ transform:translateY(-100vh); }
}

.sparkle{
position:absolute;
font-size:18px;
animation: sparkleMove 8s linear infinite;
}

@keyframes sparkleMove{
0%{ transform:translateY(100vh); opacity:0;}
50%{ opacity:1;}
100%{ transform:translateY(-100vh); opacity:0;}
}

</style>

</head>

<body>

<div class="heart">💖</div>
<div class="heart">🩷</div>
<div class="heart">💞</div>
<div class="heart">💗</div>
<div class="heart">🤍</div>
<div class="heart">✨</div>

<div class="container">

<h1>Thank You Everyone 💖</h1>

<div class="message">

Thank you for all the wonderful birthday wishes 🎉 <br><br>

Each message, call, and blessing meant a lot to me 💖 <br><br>

I truly feel lucky to be surrounded by such loving people 🤍 <br><br>

Thanks again for making my birthday so special ✨

</div>

</div>

</body>
</html>
